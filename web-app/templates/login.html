{% extends "base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<section class="hero-grid">
    <div class="hero-copy">
        <div class="band band-heavy">
            <p class="band-label">Account Access</p>
            <h1 class="display-word">LOGIN TO</h1>
        </div>

        <!-- <div class="band band-body">
            <p class="micro-copy micro-copy-italic">Per-user dashboard access with isolated inventory records.</p>
        </div> -->
    </div>

    <div class="hero-number" aria-hidden="true">Better Fridge</div>
</section>

<section class="control-panel">
    <div class="panel-head">
        <p class="panel-kicker">Session Start</p>
        <p class="panel-title">Log in</p>
    </div>

    <form action="{{ url_for('main.login', next=next_url) }}" method="post" class="upload-form">
        <input type="hidden" name="next" value="{{ next_url }}">

        <label class="field-stack" for="email">
            <span class="field-label">Email</span>
            <input class="text-input" id="email" name="email" type="email" autocomplete="email" required>
        </label>

        <label class="field-stack" for="password">
            <span class="field-label">Password</span>
            <input class="text-input" id="password" name="password" type="password" autocomplete="current-password" required>
        </label>

        <div class="action-row">
            <button class="action-button" type="submit">Enter Dashboard</button>
            <a class="text-link" href="{{ url_for('main.register') }}">Create account</a>
        </div>
    </form>
</section>
{% endblock %}
