{% extends "base.html" %} {% block title %}Fridge Food Detector{% endblock %} {%
block content %}
<section class="hero-grid">
  <div class="hero-copy">
    <div class="band band-heavy">
      <p class="band-label">Image Intake</p>
      <h1 class="display-word">UPLOAD ITEM IMAGE</h1>
    </div>

    <!-- <div class="band band-body">
            <p class="micro-copy micro-copy-italic">Single-frame intake for food recognition and inventory logging.</p>
            <p class="band-text">
                Upload one fridge image. The system forwards it to the ML client,
                records detections, and pushes visible food classes into the dashboard.
            </p>
        </div> -->
  </div>

  <!-- <div class="hero-number" aria-hidden="true">01</div> -->
</section>

<section class="control-panel">
  <!-- <div class="panel-head">
        <p class="panel-kicker">Image Intake</p>
        <p class="panel-title">Upload a fridge photo</p>
    </div> -->

  <form
    action="{{ url_for('main.upload') }}"
    method="post"
    enctype="multipart/form-data"
    class="upload-form"
  >
    <label class="file-zone" for="image">
      <span class="file-zone-text"
        >Tap to choose a file and replace the preview.</span
      >

      <div class="preview-frame" data-preview-frame>
        <img
          class="preview-image"
          src="{{ url_for('static', filename='fridge.png') }}"
          alt="Reference fridge preview"
        />
      </div>

      <span class="file-spec">Accepted formats: PNG / JPG / JPEG / WEBP</span>
    </label>

    <input
      class="file-input"
      id="image"
      name="image"
      type="file"
      accept="image/*"
      required
    />

    <div class="action-row">
      <button class="action-button" type="submit">Analyze Image</button>
    </div>
  </form>
</section>

<a class="text-link" href="{{ url_for('main.dashboard') }}"
  >Go to Inventory Dashboard</a
>
{% endblock %}
